server {
    listen 8000;
    server_name _;

    # Basic CORS support for local frontend development.
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    resolver 127.0.0.11 ipv6=off valid=30s;

    set $menu_upstream menu-service:5000;
    set $cart_upstream cart-service:5000;
    set $order_upstream order-service:5000;
    set $payment_upstream payment-service:5000;
    set $task_upstream task-service:5000;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location = /api/menu {
        return 301 /api/menu/;
    }

    location /api/menu/ {
        rewrite ^/api/menu/(.*)$ /$1 break;
        proxy_pass http://$menu_upstream;
    }

    location = /api/cart {
        return 301 /api/cart/;
    }

    location /api/cart/ {
        rewrite ^/api/cart/(.*)$ /$1 break;
        proxy_pass http://$cart_upstream;
    }

    location = /api/order {
        return 301 /api/order/;
    }

    location /api/order/ {
        rewrite ^/api/order/(.*)$ /$1 break;
        proxy_pass http://$order_upstream;
    }

    location = /api/payment {
        return 301 /api/payment/;
    }

    location /api/payment/ {
        rewrite ^/api/payment/(.*)$ /$1 break;
        proxy_pass http://$payment_upstream;
    }

    location = /api/task {
        return 301 /api/task/;
    }

    location /api/task/ {
        rewrite ^/api/task/(.*)$ /$1 break;
        proxy_pass http://$task_upstream;
    }

    location / {
        return 404;
    }
}