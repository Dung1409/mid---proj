openapi: 3.0.3
info:
  title: Task Service API
  version: 1.0.0
servers:
  - url: http://localhost:5005
paths:
  /health:
    get:
      summary: Health check
      description: Check whether task-service is running.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                required:
                  - status
  /task/order:
    post:
      summary: Submit order request
      description: Create a new order from selected items and customer info, then initiate saga workflow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                address:
                  type: string
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      price:
                        type: number
                        format: double
                    required:
                      - id
                      - name
                      - price
              required:
                - phone
                - address
                - items
      responses:
        "202":
          description: Order accepted for asynchronous processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                  status:
                    type: string
                    enum:
                      - ORDER_SUBMITTED
                      - PAYMENT_FAILED
                  message:
                    type: string
                    example: Order is being processed
                required:
                  - requestId
                  - status
                  - message
        "400":
          description: Invalid input data
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid input data
                required:
                  - error
  /task/status/{requestId}:
    get:
      summary: Get order status
      description: Retrieve current Saga status for the request id.
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current status found
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                  orderId:
                    type: string
                  status:
                    type: string
                  message:
                    type: string
                required:
                  - requestId
                  - orderId
                  - status
                  - message
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Request not found
                required:
                  - error