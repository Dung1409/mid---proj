openapi: 3.0.3
info:
  title: Menu Service API
  version: 1.0.0
servers:
  - url: http://localhost:5001
paths:
  /health:
    get:
      summary: Health check
      description: Check whether menu-service is running.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                required:
                  - status

  /menu/items:
    get:
      summary: Get menu items
      description: Return list of all available menu items.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: Pho Bo
                        price:
                          type: integer
                          example: 45000
                required:
                  - items
        "400":
          description: Not found items
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not found items
                required:
                  - error

  /menu/validate:
    post:
      summary: Validate menu items
      description: Validate item IDs against current menu. Called by Task Service during checkout orchestration to ensure cart items are still available.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                itemIds:
                  type: array
                  items:
                    type: integer
                  example: [1, 2, 3]
              required:
                - itemIds
      responses:
        "200":
          description: All items are valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        price:
                          type: integer
                required:
                  - valid
                  - items
        "400":
          description: Invalid item IDs found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid items
                  invalidIds:
                    type: array
                    items:
                      type: integer
                    example: [99, 100]
                required:
                  - error
                  - invalidIds